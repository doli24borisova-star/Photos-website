<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Photos Website</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 30px;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    #message {
      text-align: center;
      margin: 30px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .photo-card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    .photo-card img {
      display: block;
      width: 100%;
      height: 320px;
      object-fit: cover;
    }

    .photo-name {
      padding: 12px;
      font-size: 14px;
      overflow-wrap: anywhere;
    }
  </style>
</head>

<body>
  <h1>My Photos Website</h1>

  <p id="message">Loading photos…</p>
  <main id="gallery" class="gallery"></main>

  <script>
    const owner = "doli24borisova-star";
    const repository = "Photos-website";
    const folder = "images/product";

    const apiUrl =
      `https://api.github.com/repos/${owner}/${repository}/contents/${folder}`;

    const gallery = document.getElementById("gallery");
    const message = document.getElementById("message");

    function isImage(filename) {
      return /\.(jpg|jpeg|png|gif|webp)$/i.test(filename);
    }

    async function loadPhotos() {
      try {
        const response = await fetch(apiUrl);

        if (!response.ok) {
          throw new Error(`GitHub returned error ${response.status}`);
        }

        const files = await response.json();

        const images = files
          .filter(file => file.type === "file" && isImage(file.name))
          .sort((a, b) => a.name.localeCompare(b.name));

        if (images.length === 0) {
          message.textContent = "No photos were found.";
          return;
        }

        message.remove();

        for (const image of images) {
          const card = document.createElement("article");
          card.className = "photo-card";

          const img = document.createElement("img");
          img.src = image.download_url;
          img.alt = image.name
            .replace(/\.[^.]+$/, "")
            .replaceAll("_", " ");
          img.loading = "lazy";

          const caption = document.createElement("div");
          caption.className = "photo-name";
          caption.textContent = img.alt;

          card.append(img, caption);
          gallery.appendChild(card);
        }
      } catch (error) {
        console.error(error);
        message.textContent =
          "The photos could not be loaded. Please try refreshing the page.";
      }
    }

    loadPhotos();
  </script>
</body>
</html>
